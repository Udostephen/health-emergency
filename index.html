<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Health Finder — Abia State</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body { background-color: #f9fafb; }
    .modal-bg { background-color: rgba(0, 0, 0, 0.4); }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">
  <header class="max-w-7xl mx-auto mb-6">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold">Medilink Abia</h1>
        <p class="text-sm text-gray-600">Find available hospitals & specialty centers across Abia State (17 LGAs)</p>
      </div>
      <div class="text-right">
        <div class="text-xs text-gray-500">Need urgent care?</div>
        <a href="tel:112" class="inline-block mt-1 px-3 py-1 bg-red-600 text-white rounded-lg text-sm">Call Emergency (112)</a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
    <section class="lg:col-span-1 bg-white p-4 rounded-2xl shadow-sm">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Search</label>
          <div class="mt-2 flex gap-2">
            <input id="searchInput" type="text" placeholder="Search hospital name, address or phone" class="flex-1 rounded-md border p-2">
            <button onclick="clearSearch()" class="px-3 py-2 rounded-md border">Clear</button>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Select LGA</label>
          <select id="lgaSelect" class="mt-2 block w-full rounded-md border-gray-200 p-2"></select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Filter by specialty</label>
          <select id="specialtySelect" class="mt-2 block w-full rounded-md border-gray-200 p-2"></select>
        </div>

        <div class="flex items-center gap-2">
          <input id="open24Check" type="checkbox" class="h-4 w-4">
          <label for="open24Check" class="text-sm text-gray-700">Show 24/7 facilities only</label>
        </div>

        <div class="pt-2">
          <button onclick="resetFilters()" class="w-full py-2 rounded-lg border border-gray-200 text-sm">Reset filters</button>
        </div>
      </div>
    </section>

    <section class="lg:col-span-2 bg-white p-4 rounded-2xl shadow-sm">
      <div class="h-64 md:h-96 rounded-md bg-gray-100 border border-dashed border-gray-200 flex items-center justify-center">
        <div class="text-center text-gray-500">
          <div class="font-medium">Map preview</div>
          <div class="text-sm mt-2">Interactive map goes here (Leaflet/Mapbox).</div>
        </div>
      </div>

      <div class="mt-4">
        <h2 class="text-lg font-semibold">Search results</h2>
        <div id="resultsCount" class="text-sm text-gray-500">0 facilities found</div>
        <div id="resultsContainer" class="mt-3 space-y-3 max-h-96 overflow-y-auto pr-2"></div>
      </div>
    </section>
  </main>

  <div id="hospitalModal" class="hidden fixed inset-0 z-40 flex items-center justify-center p-4">
    <div class="absolute inset-0 modal-bg" onclick="closeModal()"></div>
    <div class="relative w-full max-w-2xl bg-white rounded-2xl p-6 shadow-lg z-50">
      <div class="flex items-start justify-between">
        <div>
          <h3 id="modalName" class="text-xl font-semibold"></h3>
          <div id="modalAddress" class="text-sm text-gray-600"></div>
        </div>
        <button onclick="closeModal()" class="text-gray-500">Close</button>
      </div>
      <div class="mt-4" id="modalDetails"></div>
    </div>
  </div>

  <script>
    const LGAS = ["Aba North","Aba South","Arochukwu","Bende","Ikwuano","Isiala Ngwa North","Isiala Ngwa South","Isuikwuato","Obi Ngwa","Ohafia","Osisioma","Ugwunagbo","Ukwa East","Ukwa West","Umuahia North","Umuahia South","Umunneochi"];
    const SPECIALTIES = ["Emergency","Maternity","Trauma","Cardiology","Pediatrics","Orthopedics","General Medicine"];
    const HOSPITALS = [
      {name:"Aba General Hospital", lga:"Aba North", specialties:["Emergency","Maternity","Trauma"], phone:"+2348000000001", address:"1 Main St, Aba North", open24:true, coords:{lat:5.1,lng:7.36}},
      {name:"St. Mary's Specialist Clinic", lga:"Umuahia North", specialties:["Cardiology","Emergency","Pediatrics"], phone:"+2348000000002", address:"12 Health Ave, Umuahia North", open24:false, coords:{lat:5.53,lng:7.48}},
      {name:"Ohafia Trauma & Emergency Center", lga:"Ohafia", specialties:["Trauma","Orthopedics","Emergency"], phone:"+2348000000003", address:"3 Rescue Rd, Ohafia", open24:true, coords:{lat:5.44,lng:7.9}},
      {name:"Bende County Hospital", lga:"Bende", specialties:["Maternity","General Medicine"], phone:"+2348000000004", address:"Bende Road, Bende", open24:false, coords:{lat:5.47,lng:7.43}},
    ];

    const lgaSelect = document.getElementById('lgaSelect');
    const specialtySelect = document.getElementById('specialtySelect');
    const searchInput = document.getElementById('searchInput');
    const open24Check = document.getElementById('open24Check');
    const resultsContainer = document.getElementById('resultsContainer');
    const resultsCount = document.getElementById('resultsCount');

    LGAS.forEach(lga => {
      const opt = document.createElement('option');
      opt.value = lga;
      opt.textContent = lga;
      lgaSelect.appendChild(opt);
    });

    SPECIALTIES.forEach(spec => {
      const opt = document.createElement('option');
      opt.value = spec;
      opt.textContent = spec;
      specialtySelect.appendChild(opt);
    });

    function filterHospitals() {
      const query = searchInput.value.toLowerCase();
      const selectedLga = lgaSelect.value;
      const selectedSpec = specialtySelect.value;
      const openOnly = open24Check.checked;

      const filtered = HOSPITALS.filter(h => {
        if (selectedLga && h.lga !== selectedLga) return false;
        if (selectedSpec && !h.specialties.includes(selectedSpec)) return false;
        if (openOnly && !h.open24) return false;
        if (query && !(h.name.toLowerCase().includes(query) || h.address.toLowerCase().includes(query) || h.phone.toLowerCase().includes(query))) return false;
        return true;
      });
      renderResults(filtered);
    }

    function renderResults(list) {
      resultsContainer.innerHTML = '';
      resultsCount.textContent = `${list.length} facilities found`;
      if (list.length === 0) {
        resultsContainer.innerHTML = '<div class="text-sm text-gray-600">No facilities match your filters.</div>';
        return;
      }
      list.forEach(h => {
        const div = document.createElement('div');
        div.className = 'p-3 border rounded-lg hover:shadow-sm';
        div.innerHTML = `
          <div class="flex items-start justify-between">
            <div>
              <div class="font-medium">${h.name}</div>
              <div class="text-xs text-gray-600">${h.lga} • ${h.address}</div>
              <div class="text-xs mt-2">${h.specialties.join(', ')}</div>
            </div>
            <div class="text-right">
              <div class="text-sm">${h.open24 ? '<span class="text-green-600 font-medium">Open 24/7</span>' : '<span class="text-yellow-600">Limited hours</span>'}</div>
              <div class="mt-3">
                <button class="px-3 py-1 text-sm border rounded-md" onclick='showModal(${JSON.stringify(h).replace(/"/g, "&quot;")})'>Details</button>
              </div>
            </div>
          </div>`;
        resultsContainer.appendChild(div);
      });
    }

    function showModal(h) {
      document.getElementById('hospitalModal').classList.remove('hidden');
      document.getElementById('modalName').textContent = h.name;
      document.getElementById('modalAddress').textContent = `${h.lga} — ${h.address}`;
      document.getElementById('modalDetails').innerHTML = `
        <div class="text-sm"><strong>Phone:</strong> <a href='tel:${h.phone}'>${h.phone}</a></div>
        <div class="text-sm mt-2"><strong>Specialties:</strong> ${h.specialties.join(', ')}</div>
        <div class="text-sm mt-2"><strong>Open 24/7:</strong> ${h.open24 ? 'Yes' : 'No'}</div>
        <div class="mt-4 text-sm"><a href='https://www.google.com/maps/search/?api=1&query=${h.coords.lat},${h.coords.lng}' target='_blank' class='text-blue-600 underline'>Open in Google Maps</a></div>`;
    }

    function closeModal() {
      document.getElementById('hospitalModal').classList.add('hidden');
    }

    function clearSearch() { searchInput.value = ''; filterHospitals(); }

    function resetFilters() {
      searchInput.value = '';
      lgaSelect.value = '';
      specialtySelect.value = '';
      open24Check.checked = false;
      filterHospitals();
    }

    searchInput.addEventListener('input', filterHospitals);
    lgaSelect.addEventListener('change', filterHospitals);
    specialtySelect.addEventListener('change', filterHospitals);
    open24Check.addEventListener('change', filterHospitals);

    filterHospitals();
  </script>
</body>
</html>
